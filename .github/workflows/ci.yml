name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SecureShareAdmin.sln

      - name: Build
        run: dotnet build SecureShareAdmin.sln -c Release --no-restore

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Path SecureShareAdmin/bin/Release -Recurse -Filter SecureShareAdmin.dll |
            Where-Object { $_.FullName -notmatch '\\refs\\' } |
            Select-Object -First 1
          if (-not $dll) { throw 'Built SecureShareAdmin.dll not found.' }

          $info = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($dll.FullName)
          $version = $info.ProductVersion
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $info.FileVersion
          }

          $safe = ($version -replace '[^\w\.\-]+', '-').Trim('-')
          "version=$version" >> $env:GITHUB_OUTPUT
          "safe_version=$safe" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version (safe: $safe)"

      - name: Publish win-x64 (self-contained)
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: >
          dotnet publish SecureShareAdmin/SecureShareAdmin.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish/SecureShareAdmin
          -p:DeleteExistingFiles=true

      - name: Zip package
        id: package
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        shell: pwsh
        run: |
          $name = "SecureShareAdmin-win-x64-${{ steps.version.outputs.safe_version }}"
          $zipPath = Join-Path $PWD "publish/$name.zip"
          if (Test-Path $zipPath) { Remove-Item -LiteralPath $zipPath -Force }
          Compress-Archive -Path (Join-Path $PWD 'publish/SecureShareAdmin/*') -DestinationPath $zipPath -Force
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "zip_name=$name.zip" >> $env:GITHUB_OUTPUT
          Write-Host "Created $zipPath"

      - name: Upload package artifact
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: actions/upload-artifact@v4
        with:
          name: SecureShareAdmin-win-x64-${{ steps.version.outputs.safe_version }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Publish main-latest GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $zipPath = '${{ steps.package.outputs.zip_path }}'
          $notes = @"
          Automated self-contained win-x64 Release publish from ``main``.

          - Commit: ${{ github.sha }}
          - Version: ${{ steps.version.outputs.version }}
          - Same flags as ``PublishAndDeployTo_STAGING.ps1`` (Release, win-x64, self-contained)
          "@

          gh release view main-latest 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete main-latest --yes --cleanup-tag
          }

          gh release create main-latest $zipPath `
            --title "SecureShareAdmin (main latest)" `
            --notes $notes `
            --prerelease `
            --latest=false

      - name: Publish versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip_path }}
          generate_release_notes: true
          fail_on_unmatched_files: true
